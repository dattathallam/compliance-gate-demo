name: Compliance Gate Demo

# Demonstrates the compliance gate in same-job enforcement mode.
# The gate scans _work/_actions, enforces approved versions on disk,
# and fails the job before any gated step runs if a version is rejected.
on: [workflow_dispatch, push]

jobs:
  gated:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compliance gate
        uses: dattathallam/gh-action-compliance-gate@main
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          api-base-url: 'https://bc8d-167-103-72-120.ngrok-free.app'
          summary-level: DEBUG

      - name: Composite greeter (runs only if the gate passed)
        id: greet
        uses: dattathallam/gh-action-composite@v1
        with:
          name: "gated workflow"
          greeting: "Hello"

      - name: Show result
        shell: bash
        run: echo "message = ${{ steps.greet.outputs.message }}"

      # - name: Install yq
      #   uses: mikefarah/yq@v4
